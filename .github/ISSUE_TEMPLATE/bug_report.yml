name: Bug report
description: Report a focused CoreBlow issue
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Commands, logs, or CI links. Do not include secrets or private data.
    validations:
      required: false
